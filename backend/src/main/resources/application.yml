server:
  port: 8080

spring:
  application:
    name: smartshop-backend
  datasource:
    url: "jdbc:h2:mem:smartshopdb"
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

logging:
  level:
    org.springframework.web: INFO
    org.hibernate: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Mail settings (configure SMTP for real email delivery). For local development you can use MailHog
# or another SMTP test server. If not set, OTPs will be logged to application logs.
# spring:
#   mail:
#     host: smtp.example.com
#     port: 587
#     username: your-username
#     password: your-password
#     properties:
#       mail:
#         smtp:
#           auth: true
#           starttls.enable: true

app:
  otp:
    expiration-minutes: 10
